<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">OffLifeline background</title>
  <desc id="desc">A clean dark teal survival-themed background with contour lines, subtle mountain silhouettes, and a warm path glow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#042F35"/>
      <stop offset="0.52" stop-color="#082F2F"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="ember" cx="0.39" cy="0.72" r="0.54">
      <stop offset="0" stop-color="#EA580C" stop-opacity="0.34"/>
      <stop offset="0.42" stop-color="#EA580C" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#EA580C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coolGlow" cx="0.74" cy="0.28" r="0.62">
      <stop offset="0" stop-color="#14B8A6" stop-opacity="0.16"/>
      <stop offset="0.45" stop-color="#14B8A6" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F97316" stop-opacity="0"/>
      <stop offset="0.42" stop-color="#FDBA74" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.92  0 1 0 0 0.35  0 0 1 0 0.05  0 0 0 0.42 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#ember)"/>
  <rect width="1920" height="1080" fill="url(#coolGlow)"/>

