<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">OffLifeline promotional end card</title>
  <desc id="desc">A final promotional page for OffLifeline with the app icon, brand name, English tagline, feature keywords, and project repository link.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#042F35"/>
      <stop offset="0.52" stop-color="#082F2F"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="ember" cx="0.39" cy="0.72" r="0.54">
      <stop offset="0" stop-color="#EA580C" stop-opacity="0.34"/>
      <stop offset="0.42" stop-color="#EA580C" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#EA580C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F97316" stop-opacity="0"/>
      <stop offset="0.42" stop-color="#FDBA74" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="32" stdDeviation="32" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.92  0 1 0 0 0.35  0 0 1 0 0.05  0 0 0 0.42 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="230" y="225" width="430" height="430" rx="96"/>
    </clipPath>
    <style>
      .brand { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 108px; font-weight: 800; letter-spacing: 0; fill: #FFF7ED; }
      .tagline { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 50px; font-weight: 700; letter-spacing: 0; fill: #FFEDD5; }
      .body { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 27px; font-weight: 500; letter-spacing: 0; fill: #D1D5DB; }
      .pill { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 650; letter-spacing: 0; fill: #FFF7ED; }
      .small { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 24px; font-weight: 500; letter-spacing: 0; fill: #A7F3D0; }
      .repo { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 24px; font-weight: 650; letter-spacing: 0; fill: #FFEDD5; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#ember)"/>

  <g opacity="0.16" stroke="#99F6E4" stroke-width="2" fill="none">
    <path d="M-90 850 C250 770 432 884 716 800 C982 722 1160 762 1398 680 C1614 606 1784 610 2012 524"/>
    <path d="M-90 934 C218 856 438 954 746 876 C990 814 1192 846 1460 762 C1664 698 1812 714 2012 642"/>
    <path d="M-90 1015 C226 936 490 1010 790 948 C1052 894 1222 922 1514 842 C1718 786 1840 792 2012 748"/>
    <path d="M-70 223 C204 172 404 210 668 164 C908 122 1060 140 1298 104 C1532 68 1736 74 1992 22"/>
  </g>

  <g opacity="0.20" fill="#064E3B">
    <path d="M0 815 L176 628 L282 718 L418 552 L592 758 L700 670 L842 818 L842 1080 L0 1080 Z"/>
    <path d="M1182 820 L1306 676 L1418 760 L1536 626 L1702 820 L1920 706 L1920 1080 L1182 1080 Z"/>
  </g>

  <path d="M242 842 C412 790 566 782 728 844 C900 910 1050 930 1222 860 C1370 800 1516 794 1686 850" stroke="url(#trail)" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.58" filter="url(#glow)"/>

  <g filter="url(#softShadow)">
    <rect x="196" y="191" width="498" height="498" rx="120" fill="#062C33" opacity="0.56"/>
    <image href="offlifeline-icon.png" x="230" y="225" width="430" height="430" clip-path="url(#iconClip)" preserveAspectRatio="xMidYMid slice"/>
  </g>

  <g transform="translate(750 238)">
    <text class="small" x="0" y="0">OFFLINE SURVIVAL AGENT FOR ANDROID</text>
    <text class="brand" x="0" y="136">OffLifeline</text>
    <text class="tagline" x="4" y="220">No signal. Still a next step.</text>
    <text class="body" x="6" y="290">An offline survival assistant ready after install, helping you stay oriented</text>
    <text class="body" x="6" y="330">with local models, emergency tools, and field guides when the network is gone.</text>

    <g transform="translate(0 420)">
      <rect x="0" y="0" width="188" height="60" rx="30" fill="#EA580C"/>
      <text class="pill" x="94" y="38" text-anchor="middle">Local Agent</text>
      <rect x="212" y="0" width="162" height="60" rx="30" fill="#0F766E"/>
      <text class="pill" x="293" y="38" text-anchor="middle">SOS Tools</text>
      <rect x="398" y="0" width="232" height="60" rx="30" fill="#374151"/>
      <text class="pill" x="514" y="38" text-anchor="middle">Emergency Card</text>
      <rect x="654" y="0" width="216" height="60" rx="30" fill="#92400E"/>
      <text class="pill" x="762" y="38" text-anchor="middle">Offline Guides</text>
    </g>

    <g transform="translate(2 566)">
      <line x1="0" y1="0" x2="870" y2="0" stroke="#F97316" stroke-width="3" opacity="0.58"/>
      <text class="body" x="0" y="60" fill="#E5E7EB">LiteRT-LM / gemma-4-e2/4b-it-litert-lm / CameraX / Local RAG</text>
    </g>
  </g>

  <a href="https://github.com/salty-yv/offline-lifeline" target="_blank">
    <g transform="translate(750 940)">
      <text class="repo" x="0" y="0">github.com/salty-yv/offline-lifeline</text>
    </g>
  </a>

  <text x="1880" y="960" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500" fill="#9CA3AF">OffLifeline | Stay ready when signal is gone</text>
</svg>
